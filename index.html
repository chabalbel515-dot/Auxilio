<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Sensibilidade</title>

<link rel="manifest" href="manifest.json">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#0b0b0b;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;

}

/* CARD */

.card{

background:#111;
padding:25px;
border-radius:15px;
width:330px;
box-shadow:0 0 25px rgba(255,140,0,0.3);

}

h2{
text-align:center;
margin-bottom:20px;
}

/* OPTIONS */

.option{

display:flex;
justify-content:space-between;
align-items:center;
background:#1a1a1a;
padding:12px;
margin-top:10px;
border-radius:10px;

}

.option span{
font-size:14px;
}

/* BUTTON */

button{

width:100%;
padding:14px;
margin-top:20px;
background:orange;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;

}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:40px;
height:20px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{

position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
border-radius:20px;

}

.slider:before{

position:absolute;
content:"";
height:14px;
width:14px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:0.3s;

}

input:checked + .slider{
background:orange;
}

input:checked + .slider:before{
transform:translateX(18px);
}

</style>

</head>

<body>

<div class="card">

<h2>PAINEL SENSIBILIDADE</h2>

<div class="option">
<span>Aimbot legit</span>
<label class="switch">
<input type="checkbox" onchange="toggleOption('aimbot',this.checked)">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Reduzir lags</span>
<label class="switch">
<input type="checkbox" onchange="toggleOption('antilag',this.checked)">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Melhorar 2x</span>
<label class="switch">
<input type="checkbox" onchange="toggleOption('boost',this.checked)">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Aumentar desempenho</span>
<label class="switch">
<input type="checkbox" onchange="toggleOption('performance',this.checked)">
<span class="slider"></span>
</label>
</div>

<button onclick="startEngine()">INICIAR TESTE</button>

</div>

<script src="engine.js"></script>
<script src="enginebundle.js"></script>

<script>

function toggleOption(name,value){

Engine.setOption(name,value)

}

function startEngine(){

Engine.start()

}

/* registrar service worker */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
  </html>
