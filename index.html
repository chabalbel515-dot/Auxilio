<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Sielzada V3</title>
    <style>
        /* DESIGN SIELZADA V3 - UNIFICADO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #000;
            background-image: radial-gradient(circle at center, #1a1000 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .panel-container {
            width: 90%;
            max-width: 360px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 25px;
            padding: 25px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .profile-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #ff8c00;
            margin: 0 auto 15px;
            overflow: hidden;
            background: #111;
        }

        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 2px; color: #ff8c00; }
        h3 { font-size: 0.85rem; color: #888; margin-bottom: 15px; font-weight: normal; }

        input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }

        .main-btn {
            width: 100%;
            background: #ff8c00;
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-btn:active { transform: scale(0.96); }

        .toggle-list { margin-top: 20px; text-align: left; }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 15px;
            border-left: 3px solid transparent;
        }

        .toggle-item:has(input:checked) { border-left-color: #ff8c00; background: rgba(255,140,0,0.05); }

        .item-info span { display: block; font-size: 0.9rem; font-weight: bold; }
        .item-info small { color: #666; font-size: 0.7rem; }

        /* Switch Estilo iPhone/Gamer */
        .switch { position: relative; width: 42px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff8c00; }
        input:checked + .slider:before { transform: translateX(20px); }

        .footer-brand { margin-top: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.1); letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="panel-container">
        <div class="glass-card">
            <div class="profile-circle">
                <img src="https://i.imgur.com/8Km9mS7.png" alt="Sielz">
            </div>
            <h3>coloca a key de acesso</h3>
            <input type="password" id="access-key" placeholder="insira a key...">
            <button onclick="checkKey()" class="main-btn">logar</button>
            <div class="footer-brand">sielz</div>
        </div>
    </div>

    <div id="main-panel" class="panel-container" style="display: none; opacity: 0; transform: translateY(20px);">
        <div class="glass-card">
            <h2>PAINEL SIELZADA V3</h2>
            <div class="toggle-list">
                <div class="toggle-item">
                    <div class="item-info"><span>aimbot legit</span><small>Alinhamento via Bézier</small></div>
                    <label class="switch"><input type="checkbox" id="aim-lock"><span class="slider"></span></label>
                </div>
                <div class="toggle-item">
                    <div class="item-info"><span>reduzir lags</span><small>Filtro de ruído Samsung</small></div>
                    <label class="switch"><input type="checkbox" id="reduce-lag"><span class="slider"></span></label>
                </div>
                <div class="toggle-item">
                    <div class="item-info"><span>melhorar 2x</span><small>Sensibilidade Linear</small></div>
                    <label class="switch"><input type="checkbox" id="boost-2x"><span class="slider"></span></label>
                </div>
                <div class="toggle-item">
                    <div class="item-info"><span>desempenho</span><small>Prioridade de Input</small></div>
                    <label class="switch"><input type="checkbox" id="max-fps"><span class="slider"></span></label>
                </div>
            </div>
            <button class="main-btn" style="margin-top: 20px;" onclick="window.location.href='intent://#Intent;scheme=android-app;package=com.dts.freefiremax;end'">ABRIR GAME</button>
            <div class="footer-brand">sielz</div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script>
        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
